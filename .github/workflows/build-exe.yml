name: Build Tokyo Downloader EXE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  build-windows:
    runs-on: windows-latest 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Safely above your 3.8+ requirement

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # Installs your specific requirements (bs4, lxml, typer, etc.)
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        # --onefile makes it a single executable
        # -n sets the output file name to "Tokyo-Downloader.exe"
        pyinstaller --onefile -n "Tokyo-Downloader" main.py 

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Tokyo-Downloader-Windows-EXE
        path: dist/Tokyo-Downloader.exe
